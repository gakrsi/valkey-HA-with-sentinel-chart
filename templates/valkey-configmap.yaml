apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey-sentinel-ha.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-sentinel-ha.labels" . | nindent 4 }}
data:
  valkey.conf: |
    appendonly {{ .Values.valkey.config.appendonly }}
    protected-mode {{ .Values.valkey.config.protectedMode }}
    dir {{ .Values.valkey.config.dataDir }}
    {{- if .Values.valkey.config.extraConfig }}
    {{- .Values.valkey.config.extraConfig | nindent 4 }}
    {{- end }}
