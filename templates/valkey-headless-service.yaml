apiVersion: v1
kind: Service
metadata:
  name: {{ include "valkey-sentinel-ha.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-sentinel-ha.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "valkey-sentinel-ha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
  ports:
  - port: {{ .Values.valkey.service.port }}
    targetPort: valkey
    protocol: TCP
    name: valkey
