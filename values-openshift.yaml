# OpenShift-compatible values for Valkey Sentinel HA
# This overrides the default values to work with OpenShift's Security Context Constraints

auth:
  enabled: true
  password: ""  # Auto-generate

valkey:
  replicas: 3

  image:
    repository: valkey/valkey
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent

  service:
    port: 6379

  config:
    appendonly: "yes"
    protectedMode: "no"
    dataDir: "/data"
    extraConfig: ""

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi

  # Disable explicit pod security context - let OpenShift SCC handle it
  podSecurityContext:
    enabled: false

  # Disable explicit container security context - let OpenShift SCC handle it
  containerSecurityContext:
    enabled: false

  resources: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

sentinel:
  replicas: 3

  image:
    repository: valkey/valkey
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 26379

  masterName: mymaster
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 10000
  parallelSyncs: 1
  extraConfig: ""

  # Disable explicit pod security context - let OpenShift SCC handle it
  podSecurityContext:
    enabled: false

  # Disable explicit container security context - let OpenShift SCC handle it
  containerSecurityContext:
    enabled: false

  resources: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
